name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          uv sync
          pnpm install

      - name: Check Python formatting & linting (ruff)
        run: |
          uv run ruff check webapp/ tests/
          uv run ruff format --check webapp/ tests/

      - name: Check TypeScript formatting (prettier)
        run: pnpm format:check

  python-tests:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync

      - name: Run pytest with coverage
        run: uv run pytest tests/ -v --tb=short

  typescript-tests:
    name: TypeScript Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run vitest with coverage
        run: pnpm test:coverage

  nuxt-tests:
    name: Nuxt Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuxt

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: nuxt/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Prepare Nuxt (generate .nuxt/tsconfig.json)
        run: pnpm run postinstall

      - name: Run vitest (unit + integration + parity)
        run: pnpm test

  nuxt-e2e:
    name: Nuxt E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuxt

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: nuxt/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Prepare Nuxt (generate .nuxt/tsconfig.json)
        run: pnpm run postinstall

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: nuxt/playwright-report/
          retention-days: 14

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.14

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          uv sync
          pnpm install

      - name: Type check
        run: pnpm exec vue-tsc --noEmit

      - name: Build
        run: pnpm build
