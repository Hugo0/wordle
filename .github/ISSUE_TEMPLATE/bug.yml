name: Bug Report
description: Report a bug with wordle.global.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language
      description: Which language were you playing in (if applicable)?
      placeholder: e.g. "en", "he", "fr"
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device / Browser
      description: What device and browser are you using?
      placeholder: e.g. "iPhone 15 / Safari", "Windows / Chrome 125"
    validations:
      required: false
