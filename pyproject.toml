[project]
name = "wordle-global"
version = "1.0.0"
description = "Daily word puzzle game in 65+ languages"
requires-python = ">=3.11"
dependencies = [
    "arabic-reshaper>=3.0.0",
    "grapheme>=0.6.0",
    "openai>=2.21.0",
    "pillow>=12.1.1",
    "python-bidi==0.4.2",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.11.0",
    "wordfreq>=3.1.1",
]

[tool.ruff]
line-length = 100
target-version = "py314"
exclude = [
    ".git",
    ".venv",
    "venv",
    "node_modules",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line too long (formatter handles this)
]

[tool.ruff.lint.per-file-ignores]
# Vendor code — do not modify
"scripts/utils/google_trans_new.py" = ["E722", "E721", "B904"]

[tool.ruff.lint.isort]
known-first-party = ["word_pipeline"]
